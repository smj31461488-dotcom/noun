<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>렌주룰 오목 (AI 대전)</title>
  <style>
    body { text-align: center; font-family: sans-serif; }
    canvas { border: 1px solid black; margin-top: 20px; }
    button { margin-top: 10px; padding: 8px 16px; }
  </style>
</head>
<body>
  <h1>렌주룰 오목 (AI와 대전)</h1>
  <canvas id="board" width="600" height="600"></canvas>
  <p id="status">흑(플레이어) 차례</p>
  <button onclick="location.reload()">다시 시작</button>

  <script>
    const canvas = document.getElementById("board");
    const ctx = canvas.getContext("2d");
    const size = 15;
    const cell = 40;
    let board = Array.from({ length: size }, () => Array(size).fill(0));
    let turn = 1; // 1: 흑(플레이어), 2: 백(AI)
    let gameOver = false;

    function drawBoard() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < size; i++) {
        ctx.beginPath();
        ctx.moveTo(cell / 2, cell / 2 + i * cell);
        ctx.lineTo(cell / 2 + (size - 1) * cell, cell / 2 + i * cell);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(cell / 2 + i * cell, cell / 2);
        ctx.lineTo(cell / 2 + i * cell, cell / 2 + (size - 1) * cell);
        ctx.stroke();
      }
    }

    function drawStone(x, y, player) {
      ctx.beginPath();
      ctx.arc(cell / 2 + x * cell, cell / 2 + y * cell, 15, 0, Math.PI * 2);
      ctx.fillStyle = player === 1 ? "black" : "white";
      ctx.fill();
      ctx.stroke();
    }

    function count(x, y, dx, dy) {
      let cnt = 0;
      let player = board[y][x];
      let nx = x + dx;
      let ny = y + dy;
      while (nx >= 0 && ny >= 0 && nx < size && ny < size && board[ny][nx] === player) {
        cnt++;
        nx += dx;
        ny += dy;
      }
      return cnt;
    }

    function isWin(x, y) {
      const dirs = [[1,0],[0,1],[1,1],[1,-1]];
      for (let [dx, dy] of dirs) {
        let total = 1 + count(x,y,dx,dy) + count(x,y,-dx,-dy);
        if (total === 5) return true;
        if (total > 5 && board[y][x] === 1) return "overline";
      }
      return false;
    }

    function isForbidden(x, y) {
      if (turn !== 1) return false;
      let openThrees = 0;
      let openFours = 0;
      const dirs = [[1,0],[0,1],[1,1],[1,-1]];

      for (let [dx, dy] of dirs) {
        let line = "";
        for (let i = -4; i <= 4; i++) {
          let nx = x + dx * i;
          let ny = y + dy * i;
          if (nx < 0 || ny < 0 || nx >= size || ny >= size) line += "x";
          else if (nx === x && ny === y) line += "1";
          else line += board[ny][nx];
        }
        if (line.includes("01110")) openThrees++;
        if (line.includes("011110")) openFours++;
      }

      if (openThrees >= 2) return "33";
      if (openFours >= 2) return "44";
      return false;
    }

    function aiMove() {
      if (gameOver) return;

      // 간단한 AI: 가장 점수 높은 위치 선택
      let bestScore = -1;
      let move = null;

      for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
          if (board[y][x] !== 0) continue;

          let score = evaluate(x, y, 2) + evaluate(x, y, 1) * 0.8;

          if (score > bestScore) {
            bestScore = score;
            move = {x, y};
          }
        }
      }

      if (move) {
        placeStone(move.x, move.y, 2);
      }
    }

    function evaluate(x, y, player) {
      let score = 0;
      const dirs = [[1,0],[0,1],[1,1],[1,-1]];

      for (let [dx, dy] of dirs) {
        let count1 = countDir(x,y,dx,dy,player);
        let count2 = countDir(x,y,-dx,-dy,player);
        let total = count1 + count2;

        if (total >= 4) score += 10000;
        else if (total === 3) score += 1000;
        else if (total === 2) score += 100;
      }

      return score;
    }

    function countDir(x, y, dx, dy, player) {
      let cnt = 0;
      let nx = x + dx;
      let ny = y + dy;
      while (nx >= 0 && ny >= 0 && nx < size && ny < size && board[ny][nx] === player) {
        cnt++;
        nx += dx;
        ny += dy;
      }
      return cnt;
    }

    function placeStone(x, y, player) {
      board[y][x] = player;
      drawStone(x, y, player);

      let result = isWin(x, y);
      if (result === true) {
        alert((player === 1 ? "플레이어" : "AI") + " 승리!");
        gameOver = true;
        return;
      } else if (result === "overline") {
        alert("흑 장목 금수! AI 승리");
        gameOver = true;
        return;
      }

      turn = player === 1 ? 2 : 1;
      document.getElementById("status").innerText = turn === 1 ? "흑(플레이어) 차례" : "백(AI) 생각 중...";

      if (turn === 2) {
        setTimeout(aiMove, 300);
      }
    }

    canvas.addEventListener("click", (e) => {
      if (gameOver || turn !== 1) return;

      const rect = canvas.getBoundingClientRect();
      const x = Math.round((e.clientX - rect.left - cell/2) / cell);
      const y = Math.round((e.clientY - rect.top - cell/2) / cell);

      if (x < 0 || y < 0 || x >= size || y >= size) return;
      if (board[y][x] !== 0) return;

      board[y][x] = 1;

      let forbidden = isForbidden(x, y);
      if (forbidden) {
        alert("금수입니다: " + forbidden);
        board[y][x] = 0;
        return;
      }

      placeStone(x, y, 1);
    });

    drawBoard();
  </script>
</body>
</html>
